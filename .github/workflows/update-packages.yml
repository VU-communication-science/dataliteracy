name: Update R packages

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 8am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RENV_PATHS_ROOT: ~/.local/share/renv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Restore renv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ runner.os }}-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Install quarto-live extension
        run: |
          mkdir -p _extensions/r-wasm/live
          touch _extensions/r-wasm/live/_knitr.qmd
          quarto add r-wasm/quarto-live --no-prompt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            gsfonts \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libglpk-dev \
            libmagick++-dev \
            libnode-dev \
            libx11-dev

      - name: Restore current packages
        run: Rscript -e "renv::restore()"

      - name: Fetch previous docs for comparison
        run: |
          mkdir -p docs_old
          if git fetch origin gh-pages --depth=1 2>/dev/null; then
            git worktree add /tmp/gh-pages FETCH_HEAD
            rsync -a --exclude='.git' /tmp/gh-pages/ docs_old/
            git worktree remove /tmp/gh-pages --force
            echo "Previous docs fetched for comparison."
          else
            echo "No gh-pages branch found, comparison will be skipped."
          fi
        continue-on-error: true

      - name: Update packages
        run: |
          Rscript -e "renv::update()"
          Rscript -e "renv::snapshot()"

      - name: Check if lockfile changed
        id: lockfile
        run: |
          if git diff --quiet renv.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "All packages are already up to date."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Package updates found:"
            git diff renv.lock
          fi

      - name: Render with updated packages
        if: steps.lockfile.outputs.changed == 'true'
        id: render
        continue-on-error: true
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: live-html

      - name: Write PR body
        if: steps.lockfile.outputs.changed == 'true'
        run: |
          cat > pr_body.md << 'PRBODY'
          Automated daily package update. See the `renv.lock` diff for details on which packages changed.

          PRBODY

          # Render status
          if [ "${{ steps.render.outcome }}" == "failure" ]; then
            echo "## ⚠️ Render failed" >> pr_body.md
            echo "" >> pr_body.md
            echo "The book failed to render with the updated packages. Review the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) to identify which package caused the issue. **Do not merge until the render is fixed.**" >> pr_body.md
          else
            echo "## ✅ Render succeeded" >> pr_body.md
          fi

          echo "" >> pr_body.md

          # Chapter output comparison
          echo "## Chapter output changes" >> pr_body.md
          echo "" >> pr_body.md

          if [ ! -d "docs_old" ] || [ -z "$(ls -A docs_old 2>/dev/null)" ]; then
            echo "_No previous build was available for comparison._" >> pr_body.md
          elif [ "${{ steps.render.outcome }}" == "failure" ]; then
            echo "_Output comparison skipped because the render failed._" >> pr_body.md
          else
            CHANGED=$(diff -rq docs_old docs 2>/dev/null \
              | grep "^Files .* differ" \
              | grep "\.html" \
              | grep -v "site_libs" \
              | sed 's|^Files docs_old/||; s| and.*||' \
              | sort -u)

            if [ -z "$CHANGED" ]; then
              echo "No chapter outputs changed — the update is purely internal (bug fixes, performance, etc.)." >> pr_body.md
            else
              echo "The following chapters produced different HTML output with the updated packages. Review them before merging:" >> pr_body.md
              echo "" >> pr_body.md
              echo "$CHANGED" | while IFS= read -r chapter; do
                echo "- \`$chapter\`" >> pr_body.md
              done
            fi
          fi

      - name: Open pull request
        if: steps.lockfile.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/update-renv-$(date +%Y-%m-%d)"

          git checkout -b "$BRANCH"
          git add renv.lock
          git commit -m "chore: update renv packages $(date +%Y-%m-%d)"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update R packages ($(date +%Y-%m-%d))" \
            --body-file pr_body.md \
            --base main \
            --head "$BRANCH"
