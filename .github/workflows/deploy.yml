name: Deploy Quarto site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for git diff and fetching branches

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/*.qmd') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install quarto-live extension
        run: |
          mkdir -p _extensions/r-wasm/live
          touch _extensions/r-wasm/live/_knitr.qmd
          quarto add r-wasm/quarto-live --no-prompt

      - name: Restore _freeze from dedicated branch
        run: |
          if git ls-remote --heads origin _freeze-cache | grep -q _freeze-cache; then
            git fetch origin _freeze-cache
            echo "Restoring _freeze directory from _freeze-cache branch..."
            git checkout FETCH_HEAD -- _freeze || true
          else
            echo "Branch _freeze-cache does not exist yet. Starting fresh."
          fi

      - name: Get changed files and install dependencies
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\.qmd$' || true)
          else
            # Fallback for manual dispatch or first commit
            CHANGED_FILES=$(find . -name "*.qmd")
          fi

          if [ -n "$CHANGED_FILES" ]; then
            echo "$CHANGED_FILES" | tr '\n' '\0' | xargs -0 -r Rscript install_dependencies.R
          else
            echo "No .qmd files changed, skipping dependencies installation."
          fi

      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: live-html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Persist _freeze to dedicated branch
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the repo into a separate directory to avoid messing with the current workspace
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" freeze_repo
          cd freeze_repo

          if git ls-remote --heads origin _freeze-cache | grep -q _freeze-cache; then
            git checkout _freeze-cache
          else
            git checkout --orphan _freeze-cache
            git rm -rf .
          fi

          # Copy the updated _freeze folder from the build workspace
          if [ -d "../_freeze" ]; then
            cp -r ../_freeze .
            git add _freeze
            if git diff --staged --quiet; then
              echo "No changes to freeze cache."
            else
              git commit -m "Update freeze cache for ${{ github.sha }}"
              git push origin _freeze-cache
            fi
          else
            echo "No _freeze directory found."
          fi

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
