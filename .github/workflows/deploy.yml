name: Deploy Quarto site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RENV_PATHS_ROOT: ~/.local/share/renv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.3"
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ runner.os }}-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Install quarto-live extension
        run: |
          mkdir -p _extensions/r-wasm/live
          touch _extensions/r-wasm/live/_knitr.qmd
          quarto add r-wasm/quarto-live --no-prompt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            gsfonts \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libglpk-dev \
            libmagick++-dev \
            libnode-dev \
            libx11-dev

      - name: Restore renv
        run: Rscript -e "renv::restore()"

      - name: Fetch previous docs as fallback
        run: |
          mkdir -p docs_old
          if git fetch origin gh-pages --depth=1 2>/dev/null; then
            git worktree add /tmp/gh-pages FETCH_HEAD
            rsync -a --exclude='.git' /tmp/gh-pages/ docs_old/
            git worktree remove /tmp/gh-pages --force
            echo "Previous docs fetched as fallback."
          else
            echo "No gh-pages branch yet, starting fresh."
          fi
        continue-on-error: true

      - name: Render Quarto Project
        continue-on-error: true
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: live-html

      - name: Restore missing chapters from previous build
        run: |
          if [ -d "docs_old" ] && [ "$(ls -A docs_old 2>/dev/null)" ]; then
            find docs_old -type f | while IFS= read -r f; do
              relative="${f#docs_old/}"
              if [ ! -f "docs/$relative" ]; then
                mkdir -p "docs/$(dirname "$relative")"
                cp "$f" "docs/$relative"
                echo "Restored from previous build: $relative"
              fi
            done
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
